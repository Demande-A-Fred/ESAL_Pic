<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>Générateur de Signature ÉSAL</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 40px;
            background-color: #f4f4f4;
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        /* Style du panneau de formulaire */
        #form-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 350px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
            color: #333;
        }

        input,
        select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        /* Style du panneau de prévisualisation */
        #preview-section {
            display: flex;
            flex-direction: column;
        }

        #copy-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background-color: #5412fa;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background-color 0.2s;
        }

        #copy-btn:hover {
            background-color: #3b0cd0;
        }

        #preview-container {
            background: white;
            padding: 30px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <div id="form-container">
        <h2 style="margin-top: 0;">Vos informations</h2>

        <div class="form-group">
            <label for="input-prenom">Prénom</label>
            <input type="text" id="input-prenom" placeholder="Ex: Jeanne">
        </div>

        <div class="form-group">
            <label for="input-nom">Nom</label>
            <input type="text" id="input-nom" placeholder="Ex: Dupont">
        </div>
        <div class="form-group">
            <label for="input-email">Email (modifiable si cas particulier)</label>
            <input type="text" id="input-email" placeholder="Ex: jdupont@esalorraine.fr">
        </div>
        <div class="form-group">
            <label for="input-fonction">Fonction</label>
            <input type="text" id="input-fonction" value="Professeur d'enseignement artistique">
        </div>
        <div class="form-group">
            <label for="input-fonction2">Fonction supplémentaire / Atelier (Optionnel)</label>
            <input type="text" id="input-fonction2" placeholder="Ex: Référente égalité / Pôle Édition" maxlength="60">
            <div id="char-counter" style="font-size: 11px; color: #666; margin-top: 3px; text-align: right;">0/60</div>
        </div>

        <div class="form-group">
            <label for="input-tel">Téléphone principal (Optionnel)</label>
            <input type="text" id="input-tel" placeholder="Ex: 0612345678 (sera converti en +33 x xx xx xx xx)">
        </div>

        <div class="form-group">
            <label for="input-tel2">Téléphone secondaire (Optionnel)</label>
            <input type="text" id="input-tel2" placeholder="Ex: 0612345678 (sera converti en +33 x xx xx xx xx)">
        </div>


        <div class="form-group">
            <label for="input-site">Site de rattachement</label>
            <select id="input-site">
                <option value="metz">Pôle arts plastiques Metz</option>
                <option value="epcc">EPCC (Siège)</option>
                <option value="epinal">Pôle arts plastiques Épinal</option>
                <option value="pmd">Pôle musique et danse</option>
            </select>
        </div>
        <div>
            <!-- Bouton de diagnostic -->
            <button id="check-font-btn"
                style="margin-top: 20px; padding: 10px 15px; font-size: 14px; background-color: #c7c7c7; color: rgb(0, 0, 0); border: none; border-radius: 5px; cursor: pointer;">
                🔍 Vérifier l'installation de la typo "Messine"
            </button>

            <!-- Zone où le résultat s'affichera (masquée par défaut) -->
            <div id="font-result"
                style="margin-top: 15px; padding: 15px; background: #fff; border: 1px solid #ccc; border-radius: 5px; display: none; font-size: 14px;">
            </div>
        </div>
    </div>

    <div id="preview-section">
        <button id="copy-btn">Copier la signature</button>
        <div id="preview-container">
        </div>
    </div>

        // 2. Fonction pour nettoyer les chaînes (pour l'email)
        function cleanString(str) {
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().replace(/\s+/g, '-');
        }

        // Génération de l'email : Initiales du prénom + nom complet (sans accents/espaces)
        function generateEmail(prenom, nom) {
            if (!prenom && !nom) return "";
            // Récupère la première lettre de chaque partie du prénom séparée par un espace ou tiret
            const initials = prenom.split(/[- ]+/).map(p => p.charAt(0)).join('');
            // Nettoie et enlève tous les caractères qui ne sont pas des lettres
            const cleanStr = (str) => str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
            const prefix = cleanStr(initials + nom).replace(/[^a-z0-9]/g, '');
            return `${prefix}@esalorraine.fr`;
        }

        // Formatage du téléphone : passage au +33 et espacement
        function formatPhone(tel) {
            if (!tel) return "";
            // Garde uniquement les chiffres
            let digits = tel.replace(/\D/g, '');
            // Remplace le 0 initial par 33
            if (digits.startsWith('0')) {
                digits = '33' + digits.substring(1);
            }
            // Applique le formatage +33 X XX XX XX XX si c'est un numéro français standard (11 chiffres)
            if (digits.length === 11 && digits.startsWith('33')) {
                return `+${digits.substring(0, 2)} ${digits.substring(2, 3)} ${digits.substring(3, 5)} ${digits.substring(5, 7)} ${digits.substring(7, 9)} ${digits.substring(9, 11)}`;
            }
            // Si le numéro n'est pas standard (étranger, trop court), on le renvoie tel quel
            return tel;
        }


        // 3. Fonction principale de génération du HTML
        function updateSignature() {
            // Récupération des valeurs
            const prenom = document.getElementById('input-prenom').value || "Prénom";
            const nom = document.getElementById('input-nom').value || "Nom";
            const fonction = document.getElementById('input-fonction').value || "Fonction officielle";
            const email = document.getElementById('input-email').value || "pnom@esalorraine.fr";
            const tel1 = formatPhone(document.getElementById('input-tel').value);
            const tel2 = formatPhone(document.getElementById('input-tel2').value);
            const siteKey = document.getElementById('input-site').value;
            const fonction2 = document.getElementById('input-fonction2').value.trim();
            const fonction2Block = fonction2 ? `
<p style="margin: 0 0 3px 0; font-family: 'Messine Quotidienne Gras', 'Messine-QuotidienneGras',sans-serif; font-size: 12px; color: #000000; font-weight: bolder;">
    ${fonction2}
</p>` : "";

            const site = siteData[siteKey];

            let contactBlock = "";
            if (tel1 && tel2) {
                // Cas : 2 numéros (Email sur ligne 1, Numéros sur ligne 2)
                contactBlock = `
        <p style="margin: 0 0 3px 0; font-family: 'Messine Quotidienne Gras', 'Messine-QuotidienneGras',sans-serif; font-size: 12px; color: #000000; font-weight:bolder;">
            <a href="mailto:${email}" style="color: #000000; text-decoration: none;">${email}</a>
        </p>
        <p style="margin: 0 0 3px 0; font-family: 'Messine Quotidienne Gras', 'Messine-QuotidienneGras', sans-serif; font-size: 12px; color: #000000; font-weight:bold;">
            ${tel1} | ${tel2}
        </p>
    `;
            } else if (tel1 || tel2) {
                // Cas : 1 seul numéro (Tout sur 1 ligne)
                const singleTel = tel1 || tel2;
                contactBlock = `
        <p style="margin: 0 0 3px 0; font-family: 'Messine Quotidienne Gras', 'Messine-QuotidienneGras', sans-serif; font-size: 12px; color: #000000; font-weight:bold;">
            <a href="mailto:${email}" style="color: #000000; text-decoration: none;">${email}</a> | ${singleTel}
        </p>
    `;
            } else {
                // Cas : 0 numéro (Juste l'email)
                contactBlock = `
        <p style="margin: 0 0 3px 0; font-family: 'Messine Quotidienne Gras', 'Messine-QuotidienneGras', sans-serif; font-size: 12px; color: #000000; font-weight:bold;">
            <a href="mailto:${email}" style="color: #000000; text-decoration: none;">${email}</a>
        </p>
    `;
            }



            const htmlTemplate = `
            <table border="0" cellpadding="0" cellspacing="0" style="border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt; text-align: left; background-color: #ffffff; color: #000000;">
                <tbody>
                    <tr>
                        <td rowspan="2" valign="middle" style="width: 198px; padding-right: 7px; padding-left: 7px;">
                            <img src="https://demande-a-fred.github.io/ESAL_Pic/ESAL.gif" alt="Logo École Supérieure d'Art de Lorraine" width="152" style="width: 152px; display: block; border: none; margin: 0;">
                        </td>
                        <td valign="top" style="width: 460px; padding-right: 7px; padding-left: 7px;">
                            <p style="margin: 0 0 3px 0; font-family: 'Messine Quotidienne Gras', 'Messine-QuotidienneGras', sans-serif; font-size: 12px; color: #000000;font-weight:bold">
                                ${prenom} ${nom} | ${fonction}
                            </p>
                            ${fonction2Block}
                            ${contactBlock}
                            <p style="margin: 5px 0 10px 0; font-family: 'Messine Quotidienne Italique', 'Messine-QuotidienneItalique', sans-serif; font-size: 9px; color: #666666; font-style:italic;">
                                Afin de préserver notre environnement, merci de n’imprimer ou d’archiver ce mail qu’en cas de nécessité.
                            </p>
                        </td>
                    </tr>
                    <tr>
                        <td valign="top" style="width: 460px; padding-right: 7px; padding-left: 7px;">
                            <p style="margin: 0 0 3px 0; font-family: 'Messine Quotidienne', 'Messine-Quotidienne', sans-serif; font-size: 12px; color: #000000;">
                                ${site.ligne1}
                            </p>
                            <p style="margin: 0 0 3px 0; font-family: 'Messine Quotidienne', 'Messine-Quotidienne',sans-serif; font-size: 12px; color: #000000;">
                                ${site.ligne2}
                            </p>
                            <p style="margin: 0 0 3px 0; font-family: 'Messine Quotidienne', 'Messine-Quotidienne',sans-serif; font-size: 12px; color: #000000;">
                                ${site.ligne3}
                            </p>
                            <p style="margin: 0; font-family: 'Messine Quotidienne', 'Messine-Quotidienne',sans-serif; font-size: 12px; color: #000000;">
                                <a href="http://www.esalorraine.fr/" style="color: #000000; text-decoration: none;"><u>www.esalorraine.fr</u></a> <b>|</b> <a href="http://eepurl.com/c9fBQP" style="color: #000000; text-decoration: none;"><u>Newsletter</u></a>
                            </p>
                        </td>
                    </tr>
                    <tr>
                        <td valign="middle" style="width: 198px; padding-right: 7px; padding-left: 7px; padding-top: 10px;">
    ${site.reseaux}
</td>
                        <td style="width: 460px;"></td>
                    </tr>

            </table>`;

            // Injection dans le DOM
            document.getElementById('preview-container').innerHTML = htmlTemplate;
        }

        let emailEdited = false; // Drapeau pour savoir si l'utilisateur a forcé une adresse

        // On met à jour la signature à chaque changement sur n'importe quel champ
        document.querySelectorAll('input, select').forEach(element => {
            element.addEventListener('input', (e) => {
                // Si l'utilisateur tape manuellement dans le champ email, on lève le drapeau

                if (e.target.id === 'input-fonction2') {
                    const currentLength = e.target.value.length;
                    const counterDiv = document.getElementById('char-counter');
                    counterDiv.innerText = `${currentLength}/60`;

                    // Bonus UX : On passe le texte en rouge si on atteint la limite
                    if (currentLength === 60) {
                        counterDiv.style.color = "#dc3545";
                        counterDiv.style.fontWeight = "bold";
                    } else {
                        counterDiv.style.color = "#666";
                        counterDiv.style.fontWeight = "normal";
                    }
                }
                if (e.target.id === 'input-email') {
                    emailEdited = true;
                }
                else if ((e.target.id === 'input-prenom' || e.target.id === 'input-nom') && !emailEdited) {
                    const p = document.getElementById('input-prenom').value;
                    const n = document.getElementById('input-nom').value;
                    document.getElementById('input-email').value = generateEmail(p, n);
                }

                updateSignature();
            });
        });

        // 5. Initialisation au premier chargement
        updateSignature();

        // 6. Logique de copie (identique à avant)
        document.getElementById('copy-btn').addEventListener('click', async () => {
            const container = document.getElementById('preview-container');
            const htmlContent = container.innerHTML;
            const textContent = container.innerText;

            try {
                const htmlBlob = new Blob([htmlContent], { type: 'text/html' });
                const textBlob = new Blob([textContent], { type: 'text/plain' });

                const data = [new ClipboardItem({
                    'text/html': htmlBlob,
                    'text/plain': textBlob
                })];

                await navigator.clipboard.write(data);

                const btn = document.getElementById('copy-btn');
                const originalText = btn.innerText;
                btn.innerText = "✓ Copiée avec succès !";
                btn.style.backgroundColor = "#28a745";

                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.backgroundColor = "#5412fa";
                }, 3000);

            } catch (err) {
                console.error("Échec de la copie : ", err);
                alert("Erreur lors de la copie.");
            }
        });



        document.getElementById('check-font-btn').addEventListener('click', async () => {
            const resultDiv = document.getElementById('font-result');
            resultDiv.style.display = 'block'; // On affiche la boîte
            resultDiv.innerHTML = "⏳ Vérification en cours... (Acceptez la demande du navigateur si elle s'affiche en haut à gauche).";

            try {
                // 1. On vérifie si le navigateur supporte l'API
                if (!window.queryLocalFonts) {
                    resultDiv.innerHTML = "❌ <strong>API non supportée.</strong><br>Veuillez utiliser Google Chrome ou Microsoft Edge pour effectuer ce test.";
                    return;
                }

                // 2. On interroge le système
                const localFonts = await window.queryLocalFonts();

                // 3. On filtre pour la typo de l'école
                const myFonts = localFonts.filter(font => font.family.toLowerCase().includes("messine"));

                if (myFonts.length > 0) {
                    // On utilise un "Set" pour enlever les doublons (si Regular, Bold et Italic partagent le même nom de famille)
                    const familyNames = [...new Set(myFonts.map(f => f.family))];

                    let html = "✅ <strong>Super ! La typographie est bien installée sur cet ordinateur.</strong><br>Voici les noms système détectés :<ul>";
                    familyNames.forEach(name => {
                        html += `<li><code>${name}</code></li>`;
                    });
                    html += "</ul><p style='margin-bottom:0; font-size:12px; color:#666;'>C'est le nom exact qui est utilisé dans le code de la signature.</p>";

                    resultDiv.innerHTML = html;
                    resultDiv.style.borderLeft = "4px solid #28a745"; // Petite barre verte
                } else {
                    resultDiv.innerHTML = "❌ <strong>Typographie introuvable.</strong><br>La police 'Messine' ne semble pas être installée sur ce poste. La signature utilisera l'Arial ou l'Helvetica par défaut.";
                    resultDiv.style.borderLeft = "4px solid #dc3545"; // Petite barre rouge
                }
            } catch (err) {
                resultDiv.innerHTML = "⚠️ <strong>Permission refusée.</strong><br>Vous devez autoriser le navigateur à lire les polices locales pour faire ce test.";
                resultDiv.style.borderLeft = "4px solid #ffc107"; // Petite barre jaune
                console.error(err);
            }
        });
    </script>
